<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sharing and Collaboration | Simmer</title>
    <meta
      name="description"
      content="Watch Simmer's sharing and collaboration demo."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <header class="hero">
          <p class="eyebrow">Simmer Demo</p>
          <h1>Sharing and Collaboration</h1>
          <p class="summary">
            Share recipes and collections publicly or privately, and assign
            viewer or editor permissions so people can collaborate in the way
            that fits best.
          </p>
        </header>

        <div class="player">
          <video
            controls
            preload="metadata"
            playsinline
            poster="../media/sharing-and-collaboration-demo-preview.jpg"
            src="../media/sharing-and-collaboration-demo.mp4"
          ></video>
        </div>

        <div class="actions">
          <a class="button primary" href="../media/sharing-and-collaboration-demo.mp4">Open Video File</a>
          <a class="button secondary" href="./index.html">Back to Demo Gallery</a>
        </div>
      </section>
    </main>
  </body>
</html>
